    <style>
        /* 全局动效样式 */
        @keyframes box-drop {
          0% { transform: translateY(-300px) scale(0.5); opacity: 0; }
          60% { transform: translateY(20px) scale(1.1); opacity: 1; }
          80% { transform: translateY(-10px) scale(0.95); }
          100% { transform: translateY(0) scale(1); }
        }
        @keyframes box-shake {
          0%, 100% { transform: translateX(0) rotate(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-5deg); }
          20%, 40%, 60%, 80% { transform: translateX(10px) rotate(5deg); }
        }
        @keyframes flash-bang {
          0% { opacity: 0; transform: scale(0); }
          50% { opacity: 1; transform: scale(1); }
          100% { opacity: 0; transform: scale(1.5); }
        }
        @keyframes item-pop {
          0% { transform: scale(0.5) translateY(50px); opacity: 0; }
          70% { transform: scale(1.05) translateY(-10px); }
          100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes shimmer {
          100% { transform: translateX(100%); }
        }
        @keyframes float-large {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-15px); }
        }
        @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-5px); }
        }
        @keyframes spin-slow {
          100% { transform: rotate(360deg); }
        }
        @keyframes spin-slow-reverse {
          100% { transform: rotate(-360deg); }
        }
        @keyframes glitch {
          0% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(0deg); }
          20% { transform: translate(2px, -2px) skewX(-2deg); }
          40% { transform: translate(-2px, -2px) skewX(2deg); filter: hue-rotate(90deg); }
          60% { transform: translate(2px, 2px) skewX(-2deg); }
          80% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(180deg); }
          100% { transform: translate(2px, -2px) skewX(-2deg); }
        }
        @keyframes matrix-fall {
          0% { transform: translateY(-20px); opacity: 0.2; }
          50% { opacity: 1; }
          100% { transform: translateY(20px); opacity: 0.2; }
        }
        .animate-matrix-fall { animation: matrix-fall 2s linear infinite; }
        .animate-shimmer { animation: shimmer 2.5s infinite; }
        .animate-float-large { animation: float-large 3s ease-in-out infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-spin-slow-reverse { animation: spin-slow-reverse 10s linear infinite; }
        .animate-glitch { animation: glitch 0.3s infinite; }
        .animate-box-drop { animation: box-drop 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .animate-box-shake { animation: box-shake 0.4s ease-in-out infinite; }
        .animate-flash-bang { animation: flash-bang 0.5s ease-out forwards; }
        .animate-item-pop { animation: item-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }

                            <path d="M -15 0 C -25 -5, -25 5, -15 10" fill="none" stroke="#0EA5E9" strokeWidth="3" />
                        </g>
                    )}
                    {cat.held === 'holy-sword' && (
                        <g transform="rotate(15)">
                            <rect x="-2" y="-40" width="4" height="50" fill="#E2E8F0" stroke="#94A3B8" strokeWidth="1" />
                            <rect x="-10" y="-5" width="20" height="4" fill="#FCD34D" />
                            <circle cx="0" cy="10" r="3" fill="#FCD34D" />
                        </g>
                    )}
                    {cat.held === 'star-staff' && (
                        <g transform="rotate(25)">
                            <rect x="-2" y="-30" width="4" height="50" fill="#FBCFE8" />
                            <polygon points="0,-40 -10,-25 10,-25" fill="#FDE047" />
                            <polygon points="0,-15 -10,-30 10,-30" fill="#FDE047" />
                        </g>
                    )}
                    {cat.held === 'beam-saber' && (
                        <g transform="rotate(30)">
                            <rect x="-3" y="0" width="6" height="15" fill="#475569" />
                            <rect x="-4" y="-50" width="8" height="50" fill="#EF4444" opacity="0.8" filter="blur(2px)" className="animate-pulse" />
                            <rect x="-1.5" y="-50" width="3" height="50" fill="#FFF" />
                        </g>
                    )}
                    {cat.held === 'potion' && (
                        <g transform="translate(-10, 10)">
                            <polygon points="-5,-10 5,-10 10,5 -10,5" fill="#22C55E" opacity="0.8" />
                            <rect x="-3" y="-15" width="6" height="5" fill="#E2E8F0" />
                            <circle cx="0" cy="0" r="2" fill="#FFF" className="animate-ping" />
                        </g>
                    )}
                    {cat.held === 'coffee' && (
                        <g transform="translate(-10, 10)">
                            <polygon points="-8,-15 8,-15 5,5 -5,5" fill="#FFF" stroke="#E2E8F0" strokeWidth="2" />
                            <rect x="-8" y="-10" width="16" height="5" fill="#10B981" />
                            <path d="M 0 -18 Q 5 -25 -5 -30" fill="none" stroke="#9CA3AF" strokeWidth="2" opacity="0.5" className="animate-pulse" />
                        </g>
                    )}
                    {cat.held === 'guitar' && (
                        <g transform="rotate(-30) translate(-20, 0)">
                            <ellipse cx="0" cy="0" rx="15" ry="20" fill="#EF4444" stroke="#991B1B" strokeWidth="2" />
                            <circle cx="0" cy="5" r="5" fill="#1F2937" />
                            <rect x="-2.5" y="-40" width="5" height="40" fill="#D97706" />
                        </g>
                    )}
                    {cat.held === 'bow' && (
                        <g transform="rotate(45) translate(-10, -10)">
                            <path d="M 0 -20 Q -15 0 0 20" fill="none" stroke="#FDE047" strokeWidth="3" />
                            <line x1="0" y1="-20" x2="0" y2="20" stroke="#E2E8F0" strokeWidth="1" />
                            <line x1="-15" y1="0" x2="10" y2="0" stroke="#F472B6" strokeWidth="2" />
                            <polygon points="10,0 5,-3 5,3" fill="#F472B6" />
                        </g>
                    )}
                    {cat.held === 'cleaver' && (
                        <g transform="rotate(15)">
                            <rect x="-4" y="0" width="8" height="15" fill="#78350F" />
                            <rect x="-15" y="-30" width="20" height="30" fill="#E2E8F0" stroke="#94A3B8" strokeWidth="1" />
                        </g>
                    )}
                    {cat.held === 'cards' && (
                        <g transform="rotate(10)">
                            <rect x="-10" y="-20" width="15" height="20" fill="#FFF" stroke="#000" strokeWidth="1" transform="rotate(-15)" />
                            <rect x="-5" y="-20" width="15" height="20" fill="#FFF" stroke="#000" strokeWidth="1" />
                            <rect x="0" y="-20" width="15" height="20" fill="#FFF" stroke="#000" strokeWidth="1" transform="rotate(15)" />
                            <circle cx="-5" cy="-10" r="2" fill="#EF4444" />
                        </g>
                    )}
                    {cat.held === 'katana' && (
                        <g transform="rotate(45) translate(0, -20)">
                            <rect x="-2" y="-40" width="4" height="40" fill="#E2E8F0" />
                            <rect x="-6" y="0" width="12" height="4" fill="#FCD34D" />
                            <rect x="-3" y="4" width="6" height="15" fill="#1F2937" />
                            <path d="M -2 -40 Q 5 -20 -2 0" fill="none" stroke="#38BDF8" strokeWidth="1" className="animate-pulse" />
                        </g>
                    )}
                    {cat.held === 'paintbrush' && (
                        <g transform="rotate(20)">
                            <rect x="-2" y="-20" width="4" height="30" fill="#D97706" />
                            <path d="M -2 -20 Q 0 -30 2 -20 Z" fill="#EF4444" />
                            <circle cx="0" cy="-35" r="3" fill="#3B82F6" className="animate-bounce" />
                        </g>
                    )}
                    {cat.held === 'magnifying-glass' && (
                        <g transform="rotate(30) translate(-10, 0)">
                            <rect x="-2" y="0" width="4" height="15" fill="#78350F" />
                            <circle cx="0" cy="-10" r="10" fill="#E0F2FE" stroke="#FDE047" strokeWidth="3" opacity="0.8" />
                        </g>
                    )}
                    {cat.held === 'fish-bone' && (
                        <g transform="rotate(-20) translate(-20, 10)">
                            <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFF" strokeWidth="2" />
                            <line x1="-5" y1="-5" x2="-5" y2="5" stroke="#FFF" strokeWidth="2" />
                            <line x1="0" y1="-4" x2="0" y2="4" stroke="#FFF" strokeWidth="2" />
                            <line x1="5" y1="-5" x2="5" y2="5" stroke="#FFF" strokeWidth="2" />
                            <polygon points="15,0 20,-3 20,3" fill="#FFF" />
                        </g>
                    )}
                    {cat.held === 'laptop' && (
                        <g transform="translate(-30, 0)">
                            <polygon points="-15,0 15,0 20,10 -20,10" fill="#94A3B8" />
                            <rect x="-12" y="-15" width="24" height="15" fill="#334155" />
                            <rect x="-10" y="-13" width="20" height="11" fill="#38BDF8" className="animate-pulse" />
                        </g>
                    )}
                    </g>
                </svg>
                </div>
            );
        };

        function CatGachaGame() {
            const [yarn, setYarn] = useState(40); 
            const [collection, setCollection] = useState([]); 
            
            const BOARD_SIZE = 12;
            const MAX_MOVES = 20; 
            const [board, setBoard] = useState([]);
            const [moves, setMoves] = useState(0);
            const [gameState, setGameState] = useState({ status: 'playing', reward: 0, bonus: 0 }); 
            const [startPos, setStartPos] = useState([0,0]); 
            
            const [summonState, setSummonState] = useState('idle'); 
            const [summonResult, setSummonResult] = useState(null); 
            const SUMMON_COST = 50;

            const generateIrregularBoard = useCallback(() => {
                let newBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY_CELL));
                const TARGET_CELLS = Math.floor((BOARD_SIZE * BOARD_SIZE) * 0.65); 
                
                let cr = Math.floor(BOARD_SIZE / 2);
                let cc = Math.floor(BOARD_SIZE / 2);
                
                newBoard[cr][cc] = Math.floor(Math.random() * GRID_COLORS.length);
                let currentCells = 1;

                while (currentCells < TARGET_CELLS) {
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    const randomDir = dirs[Math.floor(Math.random() * dirs.length)];
                    cr += randomDir[0];
                    cc += randomDir[1];

                    if (cr >= 0 && cr < BOARD_SIZE && cc >= 0 && cc < BOARD_SIZE) {
                        if (newBoard[cr][cc] === EMPTY_CELL) {
                            newBoard[cr][cc] = Math.floor(Math.random() * GRID_COLORS.length);
                            currentCells++;
                        }
                    } else {
                        // 确保只跳到已有的安全单元格，保证全图联通
                        let filledCellsList = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL) filledCellsList.push([r,c]);
                            }
                        }
                        let randIdx = Math.floor(Math.random() * filledCellsList.length);
                        cr = filledCellsList[randIdx][0];
                        cc = filledCellsList[randIdx][1];
                    }
                }

                let sR = 0, sC = 0;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL) { sR = r; sC = c; break; }
                    }
                    if (newBoard[sR][sC] !== EMPTY_CELL) break;
                }

                setStartPos([sR, sC]);
                setBoard(newBoard);
                setMoves(0);
                setGameState({ status: 'playing', reward: 0, bonus: 0 });
            }, []);

            useEffect(() => { generateIrregularBoard(); }, [generateIrregularBoard]);

            const handleColorClick = (targetColorIdx) => {
                if (gameState.status !== 'playing') return;
                const [sr, sc] = startPos;
                const startColorIdx = board[sr][sc];
                if (startColorIdx === targetColorIdx) return;

                const newBoard = JSON.parse(JSON.stringify(board));
                const queue = [[sr, sc]];
                const visited = new Set([`${sr},${sc}`]);
                newBoard[sr][sc] = targetColorIdx;

                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    for (let [dr, dc] of dirs) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                            if (!visited.has(`${nr},${nc}`) && board[nr][nc] === startColorIdx) {
                                visited.add(`${nr},${nc}`);
                                newBoard[nr][nc] = targetColorIdx;
                                queue.push([nr, nc]);
                            }
                        }
                    }
                }

                setBoard(newBoard);
                const newMoves = moves + 1;
                setMoves(newMoves);

                let isWin = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== targetColorIdx) {
                            isWin = false; break;
                        }
                    }
                }

                if (isWin) {
                    const bonus = (MAX_MOVES - newMoves) * 3;
                    const totalReward = 10 + bonus;
                    setGameState({ status: 'won', reward: totalReward, bonus: bonus });
                    setYarn(prev => prev + totalReward);
                } else if (newMoves >= MAX_MOVES) {
                    setGameState({ status: 'lost', reward: 0, bonus: 0 });
                    setYarn(prev => Math.max(0, prev - 5));
                }
            };

            const handleGiveUp = () => {
                // 如果在游戏途中点击放弃，或者刚开局就点击刷新，都要扣除 5 货币
                if (gameState.status === 'playing') {
                    setYarn(prev => Math.max(0, prev - 5));
                }
                generateIrregularBoard();
            };

            const handleSummon = () => {
                if (yarn < SUMMON_COST || summonState !== 'idle') return;
                setYarn(prev => prev - SUMMON_COST);
                
                const roll = Math.random() * 100;
                let pool = [];
                if (roll < 40) pool = CAT_DICTIONARY.filter(c => c.rarity === 'N'); 
                else if (roll < 70) pool = CAT_DICTIONARY.filter(c => c.rarity === 'R'); 
                else if (roll < 85) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SR'); 
                else if (roll < 95) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SSR'); 
                else pool = CAT_DICTIONARY.filter(c => c.rarity === 'UR'); 

                const pulledCat = pool[Math.floor(Math.random() * pool.length)];
                const isNew = !collection.includes(pulledCat.id);

                setSummonState('dropping');
                setTimeout(() => {
                    setSummonState('shaking');
                    setTimeout(() => {
                        setSummonState('bursting');
                        setTimeout(() => {
                            setSummonState('revealed');
                            setSummonResult({ cat: pulledCat, isNew });
                            if (isNew) {
                                setCollection(prev => [...prev, pulledCat.id]);
                            } else {
                                setYarn(prev => prev + REFUND_RATES[pulledCat.rarity]);
                            }
                        }, 500); 
                    }, 1200); 
                }, 600); 
            };

            const closeResult = () => {
                setSummonState('idle');
                setSummonResult(null);
            };

            const progress = Math.round((collection.length / CAT_DICTIONARY.length) * 100);

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 font-sans p-4 md:p-6 flex flex-col">
                    <header className="flex justify-between items-center bg-slate-800/80 backdrop-blur p-4 rounded-3xl shadow-lg mb-6 border border-slate-700">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center rotate-3 shadow-lg shadow-indigo-500/50">
                                <PackageIcon className="text-white w-7 h-7" />
                            </div>
                            <h1 className="text-xl md:text-2xl font-black text-white tracking-tight">喵星魔法盲盒</h1>
                        </div>
                        <div className="flex items-center bg-slate-900 px-5 py-2.5 rounded-2xl border border-slate-700 shadow-inner">
                            <span className="text-sm text-indigo-400 font-bold mr-2 hidden sm:inline">魔法毛线</span>
                            <span className="text-2xl font-black text-indigo-400 flex items-center gap-2 transition-all">
                                {yarn} <span className="text-2xl">🧶</span>
                            </span>
                        </div>
                    </header>

                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* 左侧：不规则染线解谜 */}
                        <div className="bg-slate-800 rounded-3xl p-6 shadow-xl border border-slate-700 flex flex-col items-center relative overflow-hidden">
                            <div className="w-full flex justify-between items-center mb-4">
                                <div>
                                    <h2 className="text-lg font-black text-white">收服魔法线团</h2>
                                    <p className="text-xs text-slate-400 mt-1">在 <span className="text-indigo-400 font-bold">{MAX_MOVES}</span> 步内统一颜色！剩余步数越多奖励越高。</p>
                                </div>
                                <div className="text-right bg-slate-900 px-4 py-2 rounded-2xl border border-slate-700">
                                    <span className="text-xs font-bold text-slate-500 block mb-1">剩余步数 / 限制</span>
                                    <div className={`text-3xl font-black leading-none ${MAX_MOVES - moves <= 3 ? 'text-red-500 animate-pulse' : 'text-white'}`}>
                                        {MAX_MOVES - moves} <span className="text-lg text-slate-600">/ {MAX_MOVES}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="p-2 sm:p-4 mb-6 relative w-full max-w-md flex justify-center items-center flex-1">
                                <div className="grid gap-1 relative" style={{ gridTemplateColumns: `repeat(${BOARD_SIZE}, minmax(0, 1fr))`, width: '100%', aspectRatio: '1/1' }}>
                                    {board.map((row, r) => row.map((colorIdx, c) => {
                                        const isStart = (r === startPos[0] && c === startPos[1]);
                                        const isEmpty = colorIdx === EMPTY_CELL;
                                        return (
                                            <div 
                                                key={`${r}-${c}`} 
                                                className={`aspect-square transition-all duration-300 relative rounded-md ${isEmpty ? 'bg-transparent' : 'shadow-sm hover:scale-105 cursor-pointer'}`}
                                                style={{ 
                                                    backgroundColor: isEmpty ? 'transparent' : GRID_COLORS[colorIdx],
                                                    boxShadow: isEmpty ? 'none' : 'inset 0 2px 4px rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.3)'
                                                }}
                                            >
                                                {isStart && gameState.status === 'playing' && (
                                                    <div className="absolute inset-0 border-2 border-white rounded-md bg-white/40 animate-pulse z-10 flex items-center justify-center">
                                                        <ZapIcon className="text-white w-4 h-4 drop-shadow-md" />
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    }))}
                                </div>

                                {/* 游戏结束覆盖层 */}
                                {gameState.status !== 'playing' && (
                                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md rounded-3xl flex flex-col items-center justify-center z-20 animate-fade-in shadow-2xl border border-slate-700">
                                        {gameState.status === 'won' ? (
                                            <React.Fragment>
                                                <div className="text-5xl mb-4 animate-bounce">✨</div>
                                                <h3 className="text-2xl font-black text-indigo-400 mb-2">魔法收服成功！</h3>
                                                <div className="flex flex-col items-center gap-1 mb-4">
                                                    <span className="text-sm font-bold text-slate-300">通关基础奖励 <span className="text-white">+10</span></span>
                                                    <span className="text-sm font-bold text-emerald-400 bg-emerald-900/30 px-3 py-1 rounded-full border border-emerald-800">
                                                        步数节约加成 (+{gameState.bonus})
                                                    </span>
                                                </div>
                                                <p className="text-xl font-black text-indigo-300 border-t border-slate-700 pt-3 px-6">
                                                    本次共赚取 <span className="text-2xl text-white">{gameState.reward}</span> 🧶
                                                </p>
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <AlertCircleIcon className="w-16 h-16 text-red-500 mb-4 animate-pulse" />
                                                <h3 className="text-2xl font-black text-slate-200">线团彻底打结了</h3>
                                                <p className="text-sm font-bold text-red-400 mt-2 bg-red-900/20 px-4 py-1.5 rounded-full border border-red-800/50">失败惩罚扣除 5 🧶</p>
                                            </React.Fragment>
                                        )}
                                        <button 
                                            onClick={generateIrregularBoard}
                                            className="mt-8 flex items-center gap-2 bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-500 active:scale-95 transition-all shadow-lg shadow-indigo-500/25"
                                        >
                                            <RefreshCwIcon className="w-5 h-5" /> 挑战下一个拼图
                                        </button>
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-2 sm:gap-4 mb-2">
                                {GRID_COLORS.map((color, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => handleColorClick(idx)}
                                        disabled={gameState.status !== 'playing'}
                                        className="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl shadow-lg hover:scale-110 active:scale-90 transition-transform focus:outline-none relative overflow-hidden border-2 border-slate-600"
                                        style={{ backgroundColor: color }}
                                    >
                                        <div className="absolute inset-0 bg-gradient-to-br from-white/30 to-transparent"></div>
                                    </button>
                                ))}
                            </div>
                            
                            <button 
                                onClick={handleGiveUp} 
                                className="text-slate-500 hover:text-red-400 text-sm font-bold flex items-center gap-1 mt-6 bg-slate-900 hover:bg-red-900/20 px-4 py-2 rounded-xl transition-colors border border-transparent hover:border-red-900/50"
                            >
                                <RefreshCwIcon className="w-4 h-4" /> 刷新关卡 / 放弃 (-5 🧶)
                            </button>
                        </div>

                        {/* 右侧：盲盒典藏合影展示柜 */}
                        <div className="bg-slate-800 rounded-3xl p-6 shadow-xl border border-slate-700 flex flex-col relative overflow-hidden">
                            <div className="flex justify-between items-end mb-4 z-10">
                                <div>
                                    <h2 className="text-xl font-black text-white flex items-center gap-2">
                                        <GiftIcon className="w-5 h-5 text-indigo-400" /> 百猫典藏墙
                                    </h2>
                                    <div className="w-40 h-2 bg-slate-700 rounded-full mt-3 overflow-hidden shadow-inner">
                                        <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-700 ease-out relative" style={{ width: `${progress}%` }}>
                                             <div className="absolute inset-0 bg-white/20 animate-shimmer w-full"></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-right bg-slate-900 px-4 py-2 rounded-2xl border border-slate-700">
                                    <span className="text-2xl font-black text-indigo-400">{collection.length}</span>
                                    <span className="text-slate-500 font-black text-sm"> / 100</span>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto min-h-[350px] bg-slate-900 rounded-3xl p-4 border border-slate-700 mb-6 z-10 custom-scrollbar shadow-inner">
                                <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7 gap-1 sm:gap-2">
                                    {CAT_DICTIONARY.map(cat => {
                                        const isUnlocked = collection.includes(cat.id);
                                        return (
                                            <div 
                                                key={cat.id} 
                                                className={`relative p-1 rounded-xl flex flex-col items-center gap-1 transition-all duration-300 ${isUnlocked ? 'bg-slate-800 hover:bg-indigo-900/40 hover:-translate-y-1 hover:shadow-lg hover:shadow-indigo-500/20 cursor-pointer border border-slate-600 group' : 'opacity-[0.1] border border-transparent'}`}
                                                onClick={() => isUnlocked && setSummonResult({ cat, isNew: false, previewOnly: true, forceShow: true })}
                                                title={isUnlocked ? cat.name : `No.${cat.id} 未知生物`}
                                            >
                                                <div className="w-10 h-10 sm:w-12 sm:h-12 pt-1 group-hover:scale-110 transition-transform duration-300">
                                                    {isUnlocked ? (
                                                        <ComplexCatSvg cat={cat} />
                                                    ) : (
                                                        <ComplexCatSvg cat={cat} className="brightness-0 contrast-200 grayscale drop-shadow-none pointer-events-none" />
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="flex flex-col items-center z-10">
                                <button 
                                    onClick={handleSummon}
                                    disabled={yarn < SUMMON_COST || summonState !== 'idle'}
                                    className={`w-full relative overflow-hidden px-8 py-5 rounded-3xl font-black text-lg text-white shadow-xl transition-all ${yarn >= SUMMON_COST && summonState === 'idle' ? 'bg-indigo-600 hover:bg-indigo-500 hover:-translate-y-1 active:translate-y-1 shadow-indigo-500/40 border border-indigo-400' : 'bg-slate-700 text-slate-400 cursor-not-allowed border border-slate-600 shadow-none'}`}
                                >
                                    <span className="relative z-10 flex items-center justify-center gap-2">
                                        <PackageIcon className="w-6 h-6" />
                                        消耗 50 🧶 抽取盲盒
                                    </span>
                                    {yarn >= SUMMON_COST && summonState === 'idle' && (
                                        <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[100%] animate-shimmer"></div>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 沉浸式盲盒开启与展示弹窗 */}
                    {(summonState !== 'idle' || (summonResult && summonResult.forceShow)) && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-lg" onClick={() => (summonState === 'revealed' || (summonResult && summonResult.forceShow)) ? closeResult() : null}>
                            
                            {(summonState === 'dropping' || summonState === 'shaking') && (
                                <div className={`w-48 h-48 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl border-8 border-indigo-400 flex items-center justify-center shadow-[0_0_50px_rgba(99,102,241,0.5)] relative ${summonState === 'dropping' ? 'animate-box-drop' : 'animate-box-shake'}`}>
                                    <div className="absolute w-full h-8 bg-white/20 top-1/2 -translate-y-1/2"></div>
                                    <div className="absolute h-full w-8 bg-white/20 left-1/2 -translate-x-1/2"></div>
                                    <span className="text-7xl font-black text-white relative z-10 drop-shadow-md">?</span>
                                </div>
                            )}

                            {summonState === 'bursting' && (
                                <div className="w-full h-full flex items-center justify-center animate-flash-bang">
                                    <div className="w-20 h-20 bg-white rounded-full blur-3xl scale-[20]"></div>
                                </div>
                            )}

                            {(summonState === 'revealed' || (summonResult && summonResult.forceShow)) && summonResult && (
                                <div className="bg-slate-800 rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl transform animate-item-pop relative overflow-hidden border border-slate-600" onClick={e => e.stopPropagation()}>
                                    <div className="absolute inset-0 z-0 pointer-events-none opacity-20" style={{ background: 'repeating-conic-gradient(from 0deg, transparent 0deg 15deg, #000 15deg 30deg)' }}></div>
                                    
                                    <div className="relative z-10">
                                        <h3 className="text-xl font-black text-slate-300 mb-1 drop-shadow-md">
                                            {summonResult.previewOnly ? `NO.${summonResult.cat.id} 档案详情` : (summonResult.isNew ? '✨ 奇迹降临！新图鉴解锁 ✨' : '获得了熟悉的旧面孔')}
                                        </h3>
                                        
                                        <div className="my-10 flex justify-center">
                                            <div className="w-64 h-64 relative group">
                                                {(summonResult.cat.rarity === 'SSR' || summonResult.cat.rarity === 'UR') && (
                                                    <div className="absolute inset-0 bg-yellow-400/10 rounded-full blur-3xl animate-pulse"></div>
                                                )}
                                                <ComplexCatSvg cat={summonResult.cat} className="animate-float-large" />
                                            </div>
                                        </div>

                                        <div className={`inline-block px-5 py-2 rounded-xl font-black text-sm shadow-lg mb-4 border border-white/20 ${RARITY_COLORS[summonResult.cat.rarity]}`}>
                                            档案稀有度：{summonResult.cat.rarity}
                                        </div>
                                        
                                        <h4 className="text-3xl font-black text-white mb-4 drop-shadow-md">{summonResult.cat.name}</h4>
                                        <p className="text-base text-slate-300 bg-slate-900/50 p-5 rounded-2xl mb-8 border border-slate-700 leading-relaxed font-medium">
                                            "{summonResult.cat.desc}"
                                        </p>

                                        {!summonResult.isNew && !summonResult.previewOnly && (
                                            <p className="text-sm text-indigo-400 font-bold mb-6 bg-indigo-900/20 py-3 rounded-xl border border-indigo-800/50 flex items-center justify-center gap-2">
                                                重复转化：回收补偿 <span className="text-lg text-white">+{REFUND_RATES[summonResult.cat.rarity]} 🧶</span>
                                            </p>
                                        )}

                                        <button 
                                            onClick={closeResult}
                                            className="w-full bg-white text-slate-900 font-black py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all shadow-xl text-lg"
                                        >
                                            {summonResult.previewOnly ? '关闭档案' : '放入百猫墙'}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CatGachaGame />);
    </script>
</body>
</html>
