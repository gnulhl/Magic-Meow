    <style>
        @keyframes box-drop { 0% { transform: translateY(-300px) scale(0.5); opacity: 0; } 60% { transform: translateY(20px) scale(1.1); opacity: 1; } 80% { transform: translateY(-10px) scale(0.95); } 100% { transform: translateY(0) scale(1); } }
        @keyframes box-shake { 0%, 100% { transform: translateX(0) rotate(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-5deg); } 20%, 40%, 60%, 80% { transform: translateX(10px) rotate(5deg); } }
        @keyframes flash-bang { 0% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }
        @keyframes item-pop { 0% { transform: scale(0.5) translateY(50px); opacity: 0; } 70% { transform: scale(1.05) translateY(-10px); } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        @keyframes float-large { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-slow-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes glitch { 0% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(0deg); } 20% { transform: translate(2px, -2px) skewX(-2deg); } 40% { transform: translate(-2px, -2px) skewX(2deg); filter: hue-rotate(90deg); } 60% { transform: translate(2px, 2px) skewX(-2deg); } 80% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(180deg); } 100% { transform: translate(2px, -2px) skewX(-2deg); } }
        @keyframes matrix-fall { 0% { transform: translateY(-20px); opacity: 0.2; } 50% { opacity: 1; } 100% { transform: translateY(20px); opacity: 0.2; } }
        @keyframes pop-in-right { 0% { transform: translateX(100%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes ability-pulse { 0%, 100% { box-shadow: 0 0 0 0px rgba(255, 255, 255, 0.9); border-color: white; transform: scale(1); z-index: 10;} 50% { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0); border-color: rgba(255,255,255,0.5); transform: scale(1.05); z-index: 10;} }
        
        .animate-pop-in-right { animation: pop-in-right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-matrix-fall { animation: matrix-fall 2s linear infinite; }
        .animate-shimmer { animation: shimmer 2.5s infinite; }
        .animate-float-large { animation: float-large 3s ease-in-out infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-spin-slow-reverse { animation: spin-slow-reverse 10s linear infinite; }
        .animate-glitch { animation: glitch 0.3s infinite; }
        .animate-box-drop { animation: box-drop 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .animate-box-shake { animation: box-shake 0.4s ease-in-out infinite; }
        .animate-flash-bang { animation: flash-bang 0.5s ease-out forwards; }
        .animate-item-pop { animation: item-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in forwards; }
        .animate-ability-highlight { animation: ability-pulse 0.5s ease-out infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #64748B; }
        body { touch-action: manipulation; }
    </style>

        function App() {
            const [currentView, setCurrentView] = useState('game'); 
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [importCode, setImportCode] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);
            
            const [yarn, setYarn] = useState(() => {
                const saved = localStorage.getItem('meow_yarn');
                return saved !== null ? parseInt(saved, 10) : 40;
            }); 
            const [collection, setCollection] = useState(() => {
                const saved = localStorage.getItem('meow_collection');
                return saved !== null ? JSON.parse(saved) : [];
            }); 
            
            const BOARD_SIZE = 12;
            const BASE_MAX_MOVES = 20; 
            const [maxMoves, setMaxMoves] = useState(BASE_MAX_MOVES);
            const [board, setBoard] = useState([]);
            const [moves, setMoves] = useState(0);
            const [gameState, setGameState] = useState({ status: 'playing', reward: 0, bonus: 0, penalty: 0, interest: 0, lossInterest: 0 }); 
            const [startPos, setStartPos] = useState([0,0]); 
            const [affectedCells, setAffectedCells] = useState(new Set()); 
            
            const lastCompanionIdRef = useRef(null);
            const [companion, setCompanion] = useState(null);
            const [triggerAnim, setTriggerAnim] = useState(0);
            
            // 技能状态
            const [freeMovesLeft, setFreeMovesLeft] = useState(0);
            const [gambledYarn, setGambledYarn] = useState(0);
            const [extraLivesLeft, setExtraLivesLeft] = useState(0);

            const [summonState, setSummonState] = useState('idle'); 
            const [summonResult, setSummonResult] = useState(null); 
            const SUMMON_COST = 50;

            useEffect(() => {
                localStorage.setItem('meow_yarn', yarn.toString());
                localStorage.setItem('meow_collection', JSON.stringify(collection));
            }, [yarn, collection]);

            useEffect(() => {
                if (affectedCells.size > 0) {
                    const timer = setTimeout(() => {
                        setAffectedCells(new Set());
                    }, 1500); 
                    return () => clearTimeout(timer);
                }
            }, [affectedCells]);

            const generateSaveCode = () => btoa(JSON.stringify({ y: yarn, c: collection }));

            const handleCopyCode = () => {
                const el = document.createElement('textarea');
                el.value = generateSaveCode();
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            const handleImportCode = () => {
                if (!importCode.trim()) return;
                try {
                    const decoded = atob(importCode.trim());
                    const parsed = JSON.parse(decoded);
                    if (typeof parsed.y === 'number' && Array.isArray(parsed.c)) {
                        setYarn(parsed.y);
                        setCollection(parsed.c);
                        setImportCode('');
                        setShowSaveModal(false);
                    } else {
                        alert("存档代码无效！");
                    }
                } catch(e) {
                    alert("存档代码无效或已损坏！");
                }
            };

            const generateIrregularBoard = useCallback(() => {
                // 1. 先挑选羁绊猫咪，因为它可能影响颜色的生成数量
                let currentCompanion = null;
                if (collection.length > 0) {
                    let pool = collection.filter(id => id !== lastCompanionIdRef.current);
                    if (pool.length === 0) pool = collection; 
                    if (pool.length > 0) {
                        let chosenId = pool[Math.floor(Math.random() * pool.length)];
                        currentCompanion = CAT_DICTIONARY.find(c => c.id === chosenId);
                        lastCompanionIdRef.current = chosenId;
                    }
                }

                // 2. 根据羁绊决定可选颜色
                let availColorsCount = GRID_COLORS.length;
                if (currentCompanion && currentCompanion.ability && currentCompanion.ability.type === 'color_reduction') {
                    availColorsCount = Math.max(1, GRID_COLORS.length - currentCompanion.ability.value);
                }

                let newBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY_CELL));
                const TARGET_CELLS = Math.floor((BOARD_SIZE * BOARD_SIZE) * 0.65); 
                let currentCells = 0;
                let cr = Math.floor(BOARD_SIZE / 2);
                let cc = Math.floor(BOARD_SIZE / 2);
                
                newBoard[cr][cc] = Math.floor(Math.random() * availColorsCount);
                currentCells++;

                while (currentCells < TARGET_CELLS) {
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    const randomDir = dirs[Math.floor(Math.random() * dirs.length)];
                    cr += randomDir[0];
                    cc += randomDir[1];

                    if (cr >= 0 && cr < BOARD_SIZE && cc >= 0 && cc < BOARD_SIZE) {
                        if (newBoard[cr][cc] === EMPTY_CELL) {
                            newBoard[cr][cc] = Math.floor(Math.random() * availColorsCount);
                            currentCells++;
                        }
                    } else {
                        let filledCellsList = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL) filledCellsList.push([r,c]);
                            }
                        }
                        let randIdx = Math.floor(Math.random() * filledCellsList.length);
                        cr = filledCellsList[randIdx][0];
                        cc = filledCellsList[randIdx][1];
                    }
                }

                let sR = 0, sC = 0;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL) { sR = r; sC = c; break; }
                    }
                    if (newBoard[sR][sC] !== EMPTY_CELL) break;
                }

                // 3. 应用开局技能
                let calculatedMaxMoves = BASE_MAX_MOVES;
                let initFreeMoves = 0;
                let initExtraLives = 0;
                let newlyAffected = new Set();
                let currentYarn = yarn; 

                if (currentCompanion && currentCompanion.ability) {
                    const ab = currentCompanion.ability;
                    setTriggerAnim(Date.now());

                    if (ab.type === 'add_moves') {
                        calculatedMaxMoves += ab.value;
                    } else if (ab.type === 'free_moves') {
                        initFreeMoves = Math.max(0, ab.value);
                        if (ab.value < 0) calculatedMaxMoves += ab.value; 
                    } else if (ab.type === 'extra_lives') {
                        initExtraLives = ab.value;
                    } else if (ab.type === 'scramble_board') {
                        let filled = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && (r!==sR || c!==sC)) filled.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<filled.length; i++) {
                            let idx = Math.floor(Math.random() * filled.length);
                            let [rr, rc] = filled[idx];
                            newBoard[rr][rc] = Math.floor(Math.random() * availColorsCount);
                            newlyAffected.add(`${rr},${rc}`);
                            filled.splice(idx, 1);
                        }
                    } else if (ab.type === 'unify_color') {
                        let startColor = newBoard[sR][sC];
                        let filled = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== startColor) filled.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<filled.length; i++) {
                            let idx = Math.floor(Math.random() * filled.length);
                            let [rr, rc] = filled[idx];
                            newBoard[rr][rc] = startColor;
                            newlyAffected.add(`${rr},${rc}`);
                            filled.splice(idx, 1);
                        }
                    } else if (ab.type === 'border_unify') {
                        let startColor = newBoard[sR][sC];
                        for(let r=0; r<BOARD_SIZE; r++){
                            for(let c=0; c<BOARD_SIZE; c++){
                                if(newBoard[r][c] !== EMPTY_CELL && (r===0 || r===BOARD_SIZE-1 || c===0 || c===BOARD_SIZE-1)){
                                    newBoard[r][c] = startColor;
                                    newlyAffected.add(`${r},${c}`);
                                }
                            }
                        }
                    } else if (ab.type === 'color_wipe') {
                        let startColor = newBoard[sR][sC];
                        let existingColors = Array.from(new Set(newBoard.flat().filter(c => c !== EMPTY_CELL && c !== startColor)));
                        for(let i=0; i<ab.value && i<existingColors.length; i++) {
                            let wipeColor = existingColors[i];
                            for(let r=0; r<BOARD_SIZE; r++) {
                                for(let c=0; c<BOARD_SIZE; c++) {
                                    if(newBoard[r][c] === wipeColor) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'color_swap') {
                        let available = Array.from(new Set(newBoard.flat().filter(c => c !== EMPTY_CELL)));
                        if (available.length >= 2) {
                            let c1 = available[Math.floor(Math.random() * available.length)];
                            let remaining = available.filter(c => c !== c1);
                            let c2 = remaining[Math.floor(Math.random() * remaining.length)];
                            for(let r=0; r<BOARD_SIZE; r++){
                                for(let c=0; c<BOARD_SIZE; c++){
                                    if(newBoard[r][c] === c1) { newBoard[r][c] = c2; newlyAffected.add(`${r},${c}`); }
                                    else if(newBoard[r][c] === c2) { newBoard[r][c] = c1; newlyAffected.add(`${r},${c}`); }
                                }
                            }
                        }
                    } else if (ab.type === 'convert_minority') {
                        let colorCounts = {};
                        for(let r=0; r<BOARD_SIZE; r++){
                            for(let c=0; c<BOARD_SIZE; c++){
                                let color = newBoard[r][c];
                                if(color !== EMPTY_CELL) colorCounts[color] = (colorCounts[color] || 0) + 1;
                            }
                        }
                        let minColor = -1, minCount = Infinity, maxColor = -1, maxCount = -1;
                        for (let color in colorCounts) {
                            if (colorCounts[color] < minCount) { minCount = colorCounts[color]; minColor = parseInt(color); }
                            if (colorCounts[color] > maxCount) { maxCount = colorCounts[color]; maxColor = parseInt(color); }
                        }
                        if (minColor !== -1 && maxColor !== -1 && minColor !== maxColor) {
                            for(let r=0; r<BOARD_SIZE; r++){
                                for(let c=0; c<BOARD_SIZE; c++){
                                    if(newBoard[r][c] === minColor) {
                                        newBoard[r][c] = maxColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'bomb_3x3') {
                        let startColor = newBoard[sR][sC];
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            for(let r = targetR - 1; r <= targetR + 1; r++) {
                                for(let c = targetC - 1; c <= targetC + 1; c++) {
                                    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && newBoard[r][c] !== EMPTY_CELL) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'cross_blast') {
                        let startColor = newBoard[sR][sC];
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            for(let j=0; j<BOARD_SIZE; j++) {
                                if(newBoard[targetR][j] !== EMPTY_CELL) { newBoard[targetR][j] = startColor; newlyAffected.add(`${targetR},${j}`); }
                                if(newBoard[j][targetC] !== EMPTY_CELL) { newBoard[j][targetC] = startColor; newlyAffected.add(`${j},${targetC}`); }
                            }
                        }
                    } else if (ab.type === 'diagonal_blast') {
                        let startColor = newBoard[sR][sC];
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            for(let r=0; r<BOARD_SIZE; r++){
                                for(let c=0; c<BOARD_SIZE; c++){
                                    if(newBoard[r][c] !== EMPTY_CELL && (Math.abs(r - targetR) === Math.abs(c - targetC))) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'start_explosion') {
                        let startColor = newBoard[sR][sC];
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            if(targetR-1>=0 && newBoard[targetR-1][targetC]!==EMPTY_CELL) { newBoard[targetR-1][targetC]=startColor; newlyAffected.add(`${targetR-1},${targetC}`); }
                            if(targetR+1<BOARD_SIZE && newBoard[targetR+1][targetC]!==EMPTY_CELL) { newBoard[targetR+1][targetC]=startColor; newlyAffected.add(`${targetR+1},${targetC}`); }
                            if(targetC-1>=0 && newBoard[targetR][targetC-1]!==EMPTY_CELL) { newBoard[targetR][targetC-1]=startColor; newlyAffected.add(`${targetR},${targetC-1}`); }
                            if(targetC+1<BOARD_SIZE && newBoard[targetR][targetC+1]!==EMPTY_CELL) { newBoard[targetR][targetC+1]=startColor; newlyAffected.add(`${targetR},${targetC+1}`); }
                            if(newBoard[targetR][targetC]!==EMPTY_CELL) { newBoard[targetR][targetC]=startColor; newlyAffected.add(`${targetR},${targetC}`); }
                        }
                    } else if (ab.type === 'interest_based_moves') {
                        let extraMoves = Math.min(ab.extra_value, Math.floor(currentYarn / ab.value));
                        calculatedMaxMoves += extraMoves;
                    } else if (ab.type === 'loan_shark') {
                        calculatedMaxMoves += ab.value;
                    } else if (ab.type === 'invest_yarn') {
                        setYarn(y => Math.max(0, y - ab.value));
                        currentYarn = Math.max(0, currentYarn - ab.value);
                    } else if (ab.type === 'steal_yarn') {
                        setYarn(y => Math.max(0, y - ab.value));
                        currentYarn = Math.max(0, currentYarn - ab.value);
                    } else if (ab.type === 'gamble_all_in') {
                        setGambledYarn(currentYarn);
                        setYarn(0);
                        currentYarn = 0;
                    } else if (ab.type === 'auto_win_chance') {
                        if (Math.random() < ab.value) {
                            let startColor = newBoard[sR][sC];
                            for(let r=0; r<BOARD_SIZE; r++) {
                                for(let c=0; c<BOARD_SIZE; c++) {
                                    if(newBoard[r][c] !== EMPTY_CELL) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    }
                }

                setCompanion(currentCompanion);
                setFreeMovesLeft(initFreeMoves);
                setExtraLivesLeft(initExtraLives);
                setMaxMoves(calculatedMaxMoves);
                setStartPos([sR, sC]);
                setBoard(newBoard);
                setAffectedCells(newlyAffected);
                setMoves(0);
                
                let isWin = true;
                let startC = newBoard[sR][sC];
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== startC) { isWin = false; break; }
                    }
                }
                if (isWin) {
                    handleWin(0, calculatedMaxMoves, currentCompanion, currentYarn);
                } else {
                    setGameState({ status: 'playing', reward: 0, bonus: 0, penalty: 0, interest: 0, lossInterest: 0 });
                }
            }, [collection, yarn]); 

            useEffect(() => { generateIrregularBoard(); }, []);

            const handleWin = (currentMoves, mxMoves, comp, finalYarnStr) => {
                let currentYarn = finalYarnStr !== undefined ? finalYarnStr : yarn;
                const bonus = (mxMoves - currentMoves) * 3;
                let compBonus = 0;
                let mult = 1;
                let customMsg = '';

                let interestRate = 0.10;
                let interestCap = 30;
                let interestTimes = 1;
                let flatInterest = 0;
                
                if (comp && comp.ability) {
                    const ab = comp.ability;
                    if (ab.type === 'bonus_yarn_win') compBonus += ab.value;
                    if (ab.type === 'multiply_reward') mult = ab.value;
                    if (ab.type === 'invest_yarn') {
                        compBonus += ab.value * 3;
                        customMsg = '获得投资回报！';
                    }
                    if (ab.type === 'gamble_all_in') {
                        compBonus += Math.floor(gambledYarn * ab.value);
                        customMsg = '赢下生死局！暴利返还！';
                    }
                    if (ab.type === 'win_on_last_move') {
                        if (currentMoves === mxMoves) {
                            compBonus += ab.value;
                            customMsg = '极限绝杀！';
                        }
                    }
                    if (ab.type === 'lucky_win') {
                        if (mxMoves - currentMoves === ab.value) {
                            compBonus += (ab.extra_value || 100);
                            customMsg = '触发命运数字！';
                        }
                    }
                    if (ab.type === 'dynamic_multiplier') mult += (mxMoves - currentMoves) * ab.value;
                    if (ab.type === 'loan_shark') mult *= ab.extra_value;
                    if (ab.type === 'interest_step_bonus') flatInterest += (mxMoves - currentMoves) * ab.value;
                    if (ab.type === 'interest_on_move') flatInterest += currentMoves * ab.value;
                    
                    if (ab.type === 'interest_cap_up') interestCap += ab.value;
                    if (ab.type === 'interest_rate_up') interestRate += ab.value;
                    if (ab.type === 'interest_limitless') {
                        interestCap = Infinity;
                        interestRate = ab.value;
                    }
                    if (ab.type === 'compound_interest') interestTimes = ab.value;
                    if (ab.type === 'interest_flat_bonus') flatInterest += ab.value;
                    if (ab.type === 'interest_multiplier') flatInterest += Math.floor(totalInterest * (ab.value - 1)); // Needs adjustment, handled below
                    
                    if (ab.type === 'tax_evasion') {
                        if (Math.random() < ab.value) {
                            interestRate *= 3;
                            interestCap *= 3;
                            customMsg = '利息暴击翻倍！';
                        }
                    }

                    if (ab.extra_win_bonus) compBonus += ab.extra_win_bonus;
                    if (ab.extra_multiplier) mult *= ab.extra_multiplier;
                }

                let totalInterest = 0;
                if (!comp || !comp.ability || comp.ability.type !== 'loan_shark') {
                    let currentTempYarn = currentYarn;
                    for(let i=0; i<interestTimes; i++){
                        let intst = Math.floor(currentTempYarn * interestRate);
                        if (intst > interestCap) intst = interestCap;
                        totalInterest += intst;
                        currentTempYarn += intst;
                    }
                }
                totalInterest += flatInterest;

                if (comp && comp.ability && comp.ability.type === 'interest_multiplier') {
                    totalInterest = Math.floor(totalInterest * comp.ability.value);
                }

                let finalReward = Math.floor((10 + bonus + compBonus + totalInterest) * mult);
                
                if (comp && comp.ability && comp.ability.type === 'bankrupt_recovery') {
                    if (currentYarn + finalReward < comp.ability.value) {
                        let diff = comp.ability.value - (currentYarn + finalReward);
                        finalReward += diff;
                        customMsg = '触发破产低保补偿！';
                    }
                }

                setGameState({ 
                    status: 'won', 
                    reward: finalReward, 
                    bonus: bonus, 
                    baseReward: 10, 
                    compBonus, 
                    mult, 
                    customMsg,
                    interest: totalInterest 
                });
                setYarn(currentYarn + finalReward);
                setGambledYarn(0); 
            };

            const handleColorClick = (targetColorIdx) => {
                if (gameState.status !== 'playing') return;
                const [sr, sc] = startPos;
                const startColorIdx = board[sr][sc];
                if (startColorIdx === targetColorIdx) return;

                const newBoard = JSON.parse(JSON.stringify(board));
                const queue = [[sr, sc]];
                const visited = new Set([`${sr},${sc}`]);
                newBoard[sr][sc] = targetColorIdx;

                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    for (let [dr, dc] of dirs) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                            if (!visited.has(`${nr},${nc}`) && board[nr][nc] === startColorIdx) {
                                visited.add(`${nr},${nc}`);
                                newBoard[nr][nc] = targetColorIdx;
                                queue.push([nr, nc]);
                            }
                        }
                    }
                }

                let newlyAffected = new Set();
                
                if (companion && companion.ability) {
                    const ab = companion.ability;
                    if (ab.type === 'purify_on_move') {
                        let valid = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== targetColorIdx) valid.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<valid.length; i++) {
                            let idx = Math.floor(Math.random() * valid.length);
                            let [rr, rc] = valid[idx];
                            newBoard[rr][rc] = targetColorIdx;
                            newlyAffected.add(`${rr},${rc}`);
                            valid.splice(idx, 1);
                        }
                    } else if (ab.type === 'chaos_on_move') {
                        let valid = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== targetColorIdx) valid.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<valid.length; i++) {
                            let idx = Math.floor(Math.random() * valid.length);
                            let [rr, rc] = valid[idx];
                            newBoard[rr][rc] = Math.floor(Math.random() * (companion.ability.type === 'color_reduction' ? Math.max(1, GRID_COLORS.length - companion.ability.value) : GRID_COLORS.length));
                            newlyAffected.add(`${rr},${rc}`);
                            valid.splice(idx, 1);
                        }
                    } else if (ab.type === 'color_infect') {
                        let colorCounts = {};
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                let cVal = newBoard[r][c];
                                if(cVal !== EMPTY_CELL) colorCounts[cVal] = (colorCounts[cVal]||0)+1;
                            }
                        }
                        let maxColor = -1, maxC = -1;
                        for(let k in colorCounts) { if(colorCounts[k] > maxC) { maxC = colorCounts[k]; maxColor = parseInt(k); } }
                        
                        let validTargets = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] === maxColor) {
                                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                                    for(let [dr, dc] of dirs) {
                                        let nr = r + dr, nc = c + dc;
                                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && newBoard[nr][nc] !== EMPTY_CELL && newBoard[nr][nc] !== maxColor) {
                                            validTargets.push([nr, nc]);
                                        }
                                    }
                                }
                            }
                        }
                        if(validTargets.length > 0) {
                            let [rr, rc] = validTargets[Math.floor(Math.random()*validTargets.length)];
                            newBoard[rr][rc] = maxColor;
                            newlyAffected.add(`${rr},${rc}`);
                        }
                    }
                }
                
                if (newlyAffected.size > 0) {
                    setAffectedCells(newlyAffected);
                    setTriggerAnim(Date.now());
                }

                setBoard(newBoard);
                
                let moveCost = 1;
                if (freeMovesLeft > 0) {
                    moveCost = 0;
                    setFreeMovesLeft(prev => prev - 1);
                    setTriggerAnim(Date.now());
                } else if (companion && companion.ability && companion.ability.type === 'refund_move_chance') {
                    if (Math.random() < companion.ability.value) {
                        moveCost = 0;
                        setTriggerAnim(Date.now());
                    }
                }

                const newMoves = moves + moveCost;
                setMoves(newMoves);

                let isWin = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== targetColorIdx) {
                            isWin = false; break;
                        }
                    }
                }

                if (isWin) {
                    handleWin(newMoves, maxMoves, companion);
                } else if (newMoves >= maxMoves) {
                    
                    if (extraLivesLeft > 0) {
                        setExtraLivesLeft(prev => prev - 1);
                        setMaxMoves(prev => prev + 3); 
                        setTriggerAnim(Date.now());
                        return; 
                    }

                    if (companion && companion.ability && companion.ability.type === 'pay_for_moves') {
                        if (yarn >= companion.ability.value) {
                            setYarn(prev => prev - companion.ability.value);
                            setMaxMoves(prev => prev + companion.ability.extra_value);
                            setTriggerAnim(Date.now());
                            return; 
                        }
                    }

                    let penalty = 5;
                    let lossInterest = 0;
                    if (companion && companion.ability) {
                        if (companion.ability.type === 'prevent_loss_penalty') penalty = 0;
                        if (companion.ability.type === 'extra_loss_penalty') penalty += companion.ability.value;
                        if (companion.ability.type === 'penalty_to_bonus') penalty = -companion.ability.value; 
                        if (companion.ability.type === 'loss_interest') {
                            lossInterest = Math.min(20, Math.floor(yarn * companion.ability.value)); 
                        }
                    }
                    const netChange = lossInterest - penalty;
                    setGameState({ status: 'lost', reward: 0, bonus: 0, penalty, lossInterest, interest: 0 });
                    setYarn(prev => Math.max(0, prev + netChange));
                    setGambledYarn(0); 
                }
            };

            const handleGiveUp = () => {
                if (gameState.status === 'playing') {
                    setYarn(prev => Math.max(0, prev - 5));
                    setGambledYarn(0);

                generateIrregularBoard();

            const handleSummon = () => {
                if (yarn < SUMMON_COST || summonState !== 'idle') return;
                setYarn(prev => prev - SUMMON_COST);
                
                const roll = Math.random() * 100;
                let pool = [];
                if (roll < 40) pool = CAT_DICTIONARY.filter(c => c.rarity === 'N'); 
                else if (roll < 70) pool = CAT_DICTIONARY.filter(c => c.rarity === 'R'); 
                else if (roll < 85) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SR'); 
                else if (roll < 95) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SSR'); 
                else pool = CAT_DICTIONARY.filter(c => c.rarity === 'UR'); 

                const pulledCat = pool[Math.floor(Math.random() * pool.length)];
                const isNew = !collection.includes(pulledCat.id);

                setSummonState('dropping');
                setTimeout(() => {
                    setSummonState('shaking');
                    setTimeout(() => {
                        setSummonState('bursting');

                            setSummonState('revealed');
                            setSummonResult({ cat: pulledCat, isNew });
                            if (isNew) {
                                setCollection(prev => [...prev, pulledCat.id]);
                            } else {
                                setYarn(prev => prev + REFUND_RATES[pulledCat.rarity]);
                            }
                        }, 500); 
                    }, 1200); 
                }, 600);

                                    <SaveIcon className="w-5 h-5" />
                                </button>
                                <div className="flex flex-col items-end relative">
                                    <div className="flex items-center bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-700 shadow-inner">

                                            {yarn} <span className="text-lg sm:text-xl drop-shadow-md">🧶</span>
                                        </span>
                                    </div>
                                    {gambledYarn > 0 && (
                                        <span className="absolute -bottom-4 right-0 text-[10px] text-red-400 font-bold whitespace-nowrap animate-pulse">
                                            已押注: {gambledYarn}
                                        </span>
                                    )}
                                </div>
                            </div>

                    </div>

                    <div className="flex-1 p-4 md:p-6 w-full max-w-4xl mx-auto flex flex-col justify-center">
                        
                        {currentView === 'game' && (

                                                    <p className="text-xl font-black text-indigo-300">

                                                    {gameState.penalty <= 0 ? (

                                                    {gameState.lossInterest > 0 && (

                                            <button

                                            >

                                <button

                                </button>

                        {currentView === 'collection' && (
                            <div className="bg-slate-800 rounded-[2rem] p-5 sm:p-8 shadow-2xl border border-slate-700 flex flex-col h-[75vh] w-full max-w-4xl mx-auto animate-fade-in relative">
                                
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-700 pb-6 z-10">
                                    <div className="w-full sm:w-auto">

                                    <button

                                    >

                                        </span>
                                        {yarn >= SUMMON_COST && summonState === 'idle' && (

                            )}

                            {(summonState === 'revealed' || (summonResult && summonResult.forceShow)) && summonResult && (
                                <div className="bg-slate-800 rounded-[2rem] p-6 sm:p-10 max-w-md w-full max-h-[90vh] overflow-y-auto custom-scrollbar flex flex-col text-center shadow-2xl transform animate-item-pop relative border border-slate-600" onClick={e => e.stopPropagation()}>
                                    
                                    <button onClick={closeResult} className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 p-2 rounded-full transition-colors z-50 shadow-md">
                                        <CloseIcon className="w-5 h-5" />
                                    </button>

                                    <div className="absolute inset-0 z-0 pointer-events-none opacity-20" style={{ background: 'repeating-conic-gradient(from 0deg, transparent 0deg 15deg, #000 15deg 30deg)' }}></div>
                                    
                                    <div className="relative z-10 flex flex-col items-center">
                                        <h3 className="text-xl font-black text-slate-300 mb-1 drop-shadow-md mt-2">
                                            {summonResult.previewOnly ? `NO.${summonResult.cat.id} 绝密档案` : (summonResult.isNew ? '✨ 奇迹降临！新图鉴解锁 ✨' : '获得了熟悉的旧面孔')}
                                        </h3>
                                        
                                        <div className="my-6 flex justify-center">
                                            <div className="w-48 h-48 sm:w-64 sm:h-64 relative group">
                                                {(summonResult.cat.rarity === 'SSR' || summonResult.cat.rarity === 'UR') && (
                                                    <div className="absolute inset-0 bg-yellow-400/10 rounded-full blur-3xl animate-pulse"></div>
                                                )}
                                                <ComplexCatSvg cat={summonResult.cat} className="animate-float-large absolute inset-0" />
                                            </div>
                                        </div>

                                        <div className={`inline-block px-5 py-2 rounded-xl font-black text-sm shadow-lg mb-4 border border-white/20 ${RARITY_COLORS[summonResult.cat.rarity]}`}>
                                            档案等级：{summonResult.cat.rarity}
                                        </div>
                                        
                                        <h4 className="text-2xl sm:text-3xl font-black text-white mb-3 drop-shadow-md">{summonResult.cat.name}</h4>
                                        
                                        <div className="bg-indigo-900/40 border border-indigo-500/30 rounded-xl p-3 mb-4 inline-block w-full">
                                            <p className="text-sm font-bold text-indigo-300 mb-1 flex items-center justify-center gap-1"><ZapIcon className="w-4 h-4"/> 专属能力</p>
                                            <p className="text-xs sm:text-sm font-medium text-indigo-100">{summonResult.cat.ability?.desc || '未觉醒能力'}</p>
                                        </div>

                                        <p className="text-sm text-slate-400 bg-slate-900/60 p-4 rounded-xl mb-6 border border-slate-700 leading-relaxed italic w-full">
                                            "{summonResult.cat.desc}"
                                        </p>

                                        {!summonResult.isNew && !summonResult.previewOnly && (
                                            <p className="text-sm text-indigo-400 font-bold mb-6 bg-indigo-900/20 py-3 w-full rounded-xl border border-indigo-800/50 flex items-center justify-center gap-2 shadow-inner">
                                                重复转化：回收补偿 <span className="text-lg text-white">+{REFUND_RATES[summonResult.cat.rarity]} 🧶</span>
                                            </p>
                                        )}

                                        <button 
                                            onClick={closeResult}
                                            className="w-full bg-white text-slate-900 font-black py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] text-lg flex-shrink-0 mt-auto"
                                        >
                                            {summonResult.previewOnly ? '关闭档案' : (summonResult.isNew ? '收入百猫墙' : '收下补偿并返回')}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
