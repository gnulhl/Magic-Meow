        @keyframes box-shake { 0%, 100% { transform: translateX(0) rotate(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-5deg); } 20%, 40%, 60%, 80% { transform: translateX(10px) rotate(5deg); } }
        @keyframes flash-bang { 0% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }
        @keyframes item-pop { 0% { transform: scale(0.5) translateY(50px); opacity: 0; } 70% { transform: scale(1.05) translateY(-10px); } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        @keyframes float-large { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-slow-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes glitch { 0% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(0deg); } 20% { transform: translate(2px, -2px) skewX(-2deg); } 40% { transform: translate(-2px, -2px) skewX(2deg); filter: hue-rotate(90deg); } 60% { transform: translate(2px, 2px) skewX(-2deg); } 80% { transform: translate(-2px, 2px) skewX(2deg); filter: hue-rotate(180deg); } 100% { transform: translate(2px, -2px) skewX(-2deg); } }
        @keyframes matrix-fall { 0% { transform: translateY(-20px); opacity: 0.2; } 50% { opacity: 1; } 100% { transform: translateY(20px); opacity: 0.2; } }
        @keyframes pop-in-right { 0% { transform: translateX(100%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes ability-pulse { 0%, 100% { box-shadow: 0 0 0 0px rgba(255, 255, 255, 0.8); } 50% { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0); } }
        
        .animate-pop-in-right { animation: pop-in-right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-matrix-fall { animation: matrix-fall 2s linear infinite; }
        .animate-shimmer { animation: shimmer 2.5s infinite; }
        .animate-float-large { animation: float-large 3s ease-in-out infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-spin-slow-reverse { animation: spin-slow-reverse 10s linear infinite; }
        .animate-glitch { animation: glitch 0.3s infinite; }
        .animate-box-drop { animation: box-drop 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .animate-box-shake { animation: box-shake 0.4s ease-in-out infinite; }
        .animate-flash-bang { animation: flash-bang 0.5s ease-out forwards; }
        .animate-item-pop { animation: item-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in forwards; }
        .animate-ability-highlight { animation: ability-pulse 1s ease-out infinite; z-index: 10; border: 2px solid white; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        body { touch-action: manipulation; }

        { id: 93, name: '幻影刺客大师', rarity: 'SSR', color: '#000000', belly: '#111827', eyes: 'red-glow', headgear: 'ninja-headband', held: 'katana', aura: 'ghostly', desc: '你永远不知道它是从哪里掏出刀的。', ability: { type: 'cross_blast', value: 2, desc: '【十字斩杀】恐怖！连续两次十字爆破同化盘面！' } },
        { id: 94, name: '元素聚合体', rarity: 'SSR', color: '#A855F7', belly: '#D8B4FE', tail: 'tentacle-mass', headgear: 'halo', aura: 'rainbow-ring', desc: '掌控着水、火、土、风、以及猫砂。', ability: { type: 'color_wipe', value: 2, desc: '【元素剥夺】直接剥夺抹除 2 种颜色' } },
        { id: 95, name: '黄金巨龙神', rarity: 'SSR', color: '#B45309', belly: '#F59E0B', tail: 'dragon', bodygear: 'dragon-wings', headgear: 'pharaoh-crown', aura: 'sun-halo', desc: '睡在堆积如山的小鱼干上，守护财宝。', ability: { type: 'multiply_reward', value: 2.5, desc: '【巨龙宝库】通关最终收益暴涨 2.5 倍！' } },

        // --- UR级 (5%) 全员降维打击 96-100 ---
        { id: 96, name: '混沌·克苏鲁喵', rarity: 'UR', color: '#1E1B4B', belly: '#312E81', eyes: 'multiple', mouth: 'tentacles', tail: 'tentacle-mass', headgear: 'cosmic-crown', aura: 'dark-vortex', desc: '凝视深渊，深渊会向你讨要猫条。', ability: { type: 'color_wipe', value: 3, desc: '【降维打击】无理！直接强行抹除 3 种颜色！' } },
        { id: 97, name: '薛定谔的观测者', rarity: 'UR', color: '#38BDF8', belly: '#BAE6FD', eyes: 'cyber-visor', tail: 'twin', aura: 'quantum-glitch', desc: '同时存在于开盒与未开盒的状态，概率的化身。', ability: { type: 'refund_move_chance', value: 0.60, desc: '【量子叠加态】作弊！高达 60% 概率行动不耗步数' } },
        { id: 98, name: '真理·创世神喵', rarity: 'UR', color: '#F8FAFC', belly: '#FFFFFF', eyes: 'cosmic', headgear: 'halo', held: 'paintbrush', aura: 'sacred-geometry', tail: 'fluffy', desc: '用手中的画笔，绘制出了世界上的100只猫咪。', ability: { type: 'multiply_reward', value: 3, desc: '【创世干预】神恩浩荡：通关总收益夸张地 × 3 倍！' } },
        { id: 99, name: '维度吞噬者', rarity: 'UR', color: '#000000', belly: '#111827', eyes: 'red-glow', tail: 'dragon', aura: 'dimension-shatter', desc: '它每一次打呼噜，都会引发平行宇宙的地震。', ability: { type: 'auto_win_chance', value: 0.20, desc: '【黑洞吞噬】开局有 20% 的惊人概率直接碾压通关！' } },
        { id: 100, name: '概念纠缠·矩阵之眼', rarity: 'UR', color: '#064E3B', belly: '#047857', eyes: 'monocle', headgear: 'cyber-visor', aura: 'matrix-rain', desc: '看透了世界是一段代码，于是它黑进了自动喂食器。', ability: { type: 'unify_color', value: 60, desc: '【修改底层代码】霸权！开局瞬间强行同化 60 个方块！' } },
        ];

        // --- 组件逻辑 ---
        function App() {
            // UI State
            const [currentView, setCurrentView] = useState('game'); 
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [importCode, setImportCode] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);
            
            // Game State - 自动从 LocalStorage 初始化
            const [yarn, setYarn] = useState(() => {
                const saved = localStorage.getItem('meow_yarn');
                return saved !== null ? parseInt(saved, 10) : 40;
            }); 
            const [collection, setCollection] = useState(() => {
                const saved = localStorage.getItem('meow_collection');
                return saved !== null ? JSON.parse(saved) : [];
            }); 
            
            const BOARD_SIZE = 12;
            const BASE_MAX_MOVES = 20; 
            const [maxMoves, setMaxMoves] = useState(BASE_MAX_MOVES);
            const [board, setBoard] = useState([]);
            const [moves, setMoves] = useState(0);
            const [gameState, setGameState] = useState({ status: 'playing', reward: 0, bonus: 0, penalty: 0 }); 
            const [startPos, setStartPos] = useState([0,0]); 
            const [affectedCells, setAffectedCells] = useState(new Set()); // 追踪被能力影响的方块，用于播放动画
            
            // Companion State
            const lastCompanionIdRef = useRef(null);
            const [companion, setCompanion] = useState(null);
            const [triggerAnim, setTriggerAnim] = useState(0);
            const [freeMovesLeft, setFreeMovesLeft] = useState(0);

            // Gacha State
            const [summonState, setSummonState] = useState('idle'); 
            const [summonResult, setSummonResult] = useState(null); 
            const SUMMON_COST = 50;

            // --- 自动保存到 LocalStorage ---
            useEffect(() => {
                localStorage.setItem('meow_yarn', yarn.toString());
                localStorage.setItem('meow_collection', JSON.stringify(collection));
            }, [yarn, collection]);

            // --- 清理特效高光 ---
            useEffect(() => {
                if (affectedCells.size > 0) {
                    const timer = setTimeout(() => {
                        setAffectedCells(new Set());
                    }, 1500); // 高光动画持续 1.5 秒
                    return () => clearTimeout(timer);
                }
            }, [affectedCells]);

            // --- 存档逻辑 ---
            const generateSaveCode = () => btoa(JSON.stringify({ y: yarn, c: collection }));

            const handleCopyCode = () => {
                const el = document.createElement('textarea');
                el.value = generateSaveCode();
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            const handleImportCode = () => {
                if (!importCode.trim()) return;
                try {
                    const decoded = atob(importCode.trim());
                    const parsed = JSON.parse(decoded);
                    if (typeof parsed.y === 'number' && Array.isArray(parsed.c)) {
                        setYarn(parsed.y);
                        setCollection(parsed.c);
                        setImportCode('');
                        setShowSaveModal(false);
                    } else {
                        alert("存档代码无效！");
                    }
                } catch(e) {
                    alert("存档代码无效或已损坏！");
                }
            };

            // --- 生成关卡与触发能力 ---
            const generateIrregularBoard = useCallback(() => {
                let newBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY_CELL));
                const TARGET_CELLS = Math.floor((BOARD_SIZE * BOARD_SIZE) * 0.65); 
                let currentCells = 0;
                let cr = Math.floor(BOARD_SIZE / 2);
                let cc = Math.floor(BOARD_SIZE / 2);
                
                newBoard[cr][cc] = Math.floor(Math.random() * GRID_COLORS.length);
                currentCells++;

                while (currentCells < TARGET_CELLS) {
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    const randomDir = dirs[Math.floor(Math.random() * dirs.length)];
                    cr += randomDir[0];
                    cc += randomDir[1];

                    if (cr >= 0 && cr < BOARD_SIZE && cc >= 0 && cc < BOARD_SIZE) {
                        if (newBoard[cr][cc] === EMPTY_CELL) {
                            newBoard[cr][cc] = Math.floor(Math.random() * GRID_COLORS.length);
                            currentCells++;
                        }
                    } else {
                        let filledCellsList = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL) filledCellsList.push([r,c]);
                            }
                        }
                        let randIdx = Math.floor(Math.random() * filledCellsList.length);
                        cr = filledCellsList[randIdx][0];
                        cc = filledCellsList[randIdx][1];
                    }
                }

                let sR = 0, sC = 0;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL) { sR = r; sC = c; break; }
                    }
                    if (newBoard[sR][sC] !== EMPTY_CELL) break;
                }

                // 挑选陪伴猫咪
                let currentCompanion = null;
                if (collection.length > 0) {
                    let pool = collection.filter(id => id !== lastCompanionIdRef.current);
                    if (pool.length === 0) pool = collection; 
                    if (pool.length > 0) {
                        let chosenId = pool[Math.floor(Math.random() * pool.length)];
                        currentCompanion = CAT_DICTIONARY.find(c => c.id === chosenId);
                        lastCompanionIdRef.current = chosenId;
                    }
                }

                let calculatedMaxMoves = BASE_MAX_MOVES;
                let initFreeMoves = 0;
                let newlyAffected = new Set();
                
                if (currentCompanion && currentCompanion.ability) {
                    const ab = currentCompanion.ability;
                    setTriggerAnim(Date.now());

                    if (ab.type === 'free_moves') {
                        initFreeMoves = Math.max(0, ab.value);
                        if (ab.value < 0) calculatedMaxMoves += ab.value; 
                    } else if (ab.type === 'scramble_board') {
                        let filled = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && (r!==sR || c!==sC)) filled.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<filled.length; i++) {
                            let idx = Math.floor(Math.random() * filled.length);
                            let [rr, rc] = filled[idx];
                            newBoard[rr][rc] = Math.floor(Math.random() * GRID_COLORS.length);
                            newlyAffected.add(`${rr},${rc}`);
                            filled.splice(idx, 1);
                        }
                    } else if (ab.type === 'unify_color') {
                        let startColor = newBoard[sR][sC];
                        let filled = [];
                        for(let r=0; r<BOARD_SIZE; r++) {
                            for(let c=0; c<BOARD_SIZE; c++) {
                                if(newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== startColor) filled.push([r,c]);
                            }
                        }
                        for(let i=0; i<ab.value && i<filled.length; i++) {
                            let idx = Math.floor(Math.random() * filled.length);
                            let [rr, rc] = filled[idx];
                            newBoard[rr][rc] = startColor;
                            newlyAffected.add(`${rr},${rc}`);
                            filled.splice(idx, 1);
                        }
                    } else if (ab.type === 'color_wipe') {
                        let startColor = newBoard[sR][sC];
                        let existingColors = Array.from(new Set(newBoard.flat().filter(c => c !== EMPTY_CELL && c !== startColor)));
                        
                        for(let i=0; i<ab.value && i<existingColors.length; i++) {
                            let wipeColor = existingColors[i];
                            for(let r=0; r<BOARD_SIZE; r++) {
                                for(let c=0; c<BOARD_SIZE; c++) {
                                    if(newBoard[r][c] === wipeColor) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'color_swap') {
                        let available = Array.from(new Set(newBoard.flat().filter(c => c !== EMPTY_CELL)));
                        if (available.length >= 2) {
                            let c1 = available[Math.floor(Math.random() * available.length)];
                            let remaining = available.filter(c => c !== c1);
                            let c2 = remaining[Math.floor(Math.random() * remaining.length)];
                            
                            for(let r=0; r<BOARD_SIZE; r++){
                                for(let c=0; c<BOARD_SIZE; c++){
                                    if(newBoard[r][c] === c1) { newBoard[r][c] = c2; newlyAffected.add(`${r},${c}`); }
                                    else if(newBoard[r][c] === c2) { newBoard[r][c] = c1; newlyAffected.add(`${r},${c}`); }
                                }
                            }
                        }
                    } else if (ab.type === 'bomb_3x3') {
                        let startColor = newBoard[sR][sC];
                        // 投掷多次炸弹
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            for(let r = targetR - 1; r <= targetR + 1; r++) {
                                for(let c = targetC - 1; c <= targetC + 1; c++) {
                                    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && newBoard[r][c] !== EMPTY_CELL) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    } else if (ab.type === 'cross_blast') {
                        let startColor = newBoard[sR][sC];
                        for(let i=0; i<ab.value; i++) {
                            let targetR = Math.floor(Math.random() * BOARD_SIZE);
                            let targetC = Math.floor(Math.random() * BOARD_SIZE);
                            for(let j=0; j<BOARD_SIZE; j++) {
                                if(newBoard[targetR][j] !== EMPTY_CELL) { newBoard[targetR][j] = startColor; newlyAffected.add(`${targetR},${j}`); }
                                if(newBoard[j][targetC] !== EMPTY_CELL) { newBoard[j][targetC] = startColor; newlyAffected.add(`${j},${targetC}`); }
                            }
                        }
                    } else if (ab.type === 'steal_yarn') {
                        setYarn(y => Math.max(0, y - ab.value));
                    } else if (ab.type === 'auto_win_chance') {
                        if (Math.random() < ab.value) {
                            let startColor = newBoard[sR][sC];
                            for(let r=0; r<BOARD_SIZE; r++) {
                                for(let c=0; c<BOARD_SIZE; c++) {
                                    if(newBoard[r][c] !== EMPTY_CELL) {
                                        newBoard[r][c] = startColor;
                                        newlyAffected.add(`${r},${c}`);
                                    }
                                }
                            }
                        }
                    }
                }

                setCompanion(currentCompanion);
                setFreeMovesLeft(initFreeMoves);
                setMaxMoves(calculatedMaxMoves);
                setStartPos([sR, sC]);
                setBoard(newBoard);
                setAffectedCells(newlyAffected);
                setMoves(0);
                
                let isWin = true;
                let startC = newBoard[sR][sC];
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== startC) { isWin = false; break; }
                    }
                }
                if (isWin) {
                    handleWin(0, calculatedMaxMoves, currentCompanion);
                } else {
                    setGameState({ status: 'playing', reward: 0, bonus: 0 });
                }
            }, [collection]);

            useEffect(() => { generateIrregularBoard(); }, []);

            const handleWin = (currentMoves, mxMoves, comp) => {
                const bonus = (mxMoves - currentMoves) * 3;
                let compBonus = 0;
                let mult = 1;
                
                if (comp && comp.ability) {
                    if (comp.ability.type === 'bonus_yarn_win') compBonus = comp.ability.value;
                    if (comp.ability.type === 'multiply_reward') mult = comp.ability.value;
                    if (comp.ability.extra_win_bonus) compBonus += comp.ability.extra_win_bonus;
                    if (comp.ability.extra_multiplier) mult *= comp.ability.extra_multiplier;
                }

                const totalReward = Math.floor((10 + bonus + compBonus) * mult);
                setGameState({ status: 'won', reward: totalReward, bonus: bonus, baseReward: 10, compBonus, mult });
                setYarn(prev => prev + totalReward);
            };

            const handleColorClick = (targetColorIdx) => {
                if (gameState.status !== 'playing') return;
                const [sr, sc] = startPos;
                const startColorIdx = board[sr][sc];
                if (startColorIdx === targetColorIdx) return;

                const newBoard = JSON.parse(JSON.stringify(board));
                const queue = [[sr, sc]];
                const visited = new Set([`${sr},${sc}`]);
                newBoard[sr][sc] = targetColorIdx;

                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    for (let [dr, dc] of dirs) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                            if (!visited.has(`${nr},${nc}`) && board[nr][nc] === startColorIdx) {
                                visited.add(`${nr},${nc}`);
                                newBoard[nr][nc] = targetColorIdx;
                                queue.push([nr, nc]);
                            }
                        }
                    }
                }

                setBoard(newBoard);
                
                let moveCost = 1;
                if (freeMovesLeft > 0) {
                    moveCost = 0;
                    setFreeMovesLeft(prev => prev - 1);
                    setTriggerAnim(Date.now());
                } else if (companion && companion.ability && companion.ability.type === 'refund_move_chance') {
                    if (Math.random() < companion.ability.value) {
                        moveCost = 0;
                        setTriggerAnim(Date.now());
                    }
                }

                const newMoves = moves + moveCost;
                setMoves(newMoves);

                let isWin = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (newBoard[r][c] !== EMPTY_CELL && newBoard[r][c] !== targetColorIdx) {
                            isWin = false; break;
                        }
                    }
                }

                if (isWin) {
                    handleWin(newMoves, maxMoves, companion);
                } else if (newMoves >= maxMoves) {
                    let penalty = 5;
                    if (companion && companion.ability) {
                        if (companion.ability.type === 'prevent_loss_penalty') penalty = 0;
                        if (companion.ability.type === 'extra_loss_penalty') penalty += companion.ability.value;
                    }
                    setGameState({ status: 'lost', reward: 0, bonus: 0, penalty });
                    setYarn(prev => Math.max(0, prev - penalty));
                }
            };

            const handleGiveUp = () => {
                if (gameState.status === 'playing') {
                    setYarn(prev => Math.max(0, prev - 5));
                }
                generateIrregularBoard();
            };

            // --- 抽卡逻辑 ---
            const handleSummon = () => {
                if (yarn < SUMMON_COST || summonState !== 'idle') return;
                setYarn(prev => prev - SUMMON_COST);
                
                const roll = Math.random() * 100;
                let pool = [];
                if (roll < 40) pool = CAT_DICTIONARY.filter(c => c.rarity === 'N'); 
                else if (roll < 70) pool = CAT_DICTIONARY.filter(c => c.rarity === 'R'); 
                else if (roll < 85) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SR'); 
                else if (roll < 95) pool = CAT_DICTIONARY.filter(c => c.rarity === 'SSR'); 
                else pool = CAT_DICTIONARY.filter(c => c.rarity === 'UR'); 

                const pulledCat = pool[Math.floor(Math.random() * pool.length)];
                const isNew = !collection.includes(pulledCat.id);

                setSummonState('dropping');
                setTimeout(() => {
                    setSummonState('shaking');
                    setTimeout(() => {
                        setSummonState('bursting');
                        setTimeout(() => {
                            setSummonState('revealed');
                            setSummonResult({ cat: pulledCat, isNew });
                            if (isNew) {
                                setCollection(prev => [...prev, pulledCat.id]);
                            } else {
                                // 处理重复奖励
                                setYarn(prev => prev + REFUND_RATES[pulledCat.rarity]);
                            }
                        }, 500); 
                    }, 1200); 
                }, 600); 
            };

            const closeResult = () => {
                setSummonState('idle');
                setSummonResult(null);
            };

            const progress = Math.round((collection.length / CAT_DICTIONARY.length) * 100);

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden bg-slate-900 pb-10">
                    {/* 顶部导航与状态栏 */}
                    <div className="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-xl border-b border-slate-800 shadow-md">
                        <div className="px-4 py-3 flex justify-between items-center max-w-4xl mx-auto">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/50">
                                    <PackageIcon className="text-white w-6 h-6" />
                                </div>
                                <h1 className="text-lg font-black text-white tracking-tight hidden sm:block">魔法盲盒</h1>
                            </div>
                            
                            {/* 标签切换 */}
                            <div className="flex bg-slate-800 p-1 rounded-xl shadow-inner border border-slate-700">
                                <button 
                                    onClick={() => setCurrentView('game')}
                                    className={`px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-sm font-bold flex items-center gap-1 sm:gap-2 transition-all ${currentView === 'game' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    <GamepadIcon className="w-4 h-4" /> 解谜
                                </button>
                                <button 
                                    onClick={() => setCurrentView('collection')}
                                    className={`px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-sm font-bold flex items-center gap-1 sm:gap-2 transition-all ${currentView === 'collection' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    <GiftIcon className="w-4 h-4" /> 收藏
                                </button>
                            </div>

                            <div className="flex gap-2 items-center">
                                <button 
                                    onClick={() => setShowSaveModal(true)}
                                    className="p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-600 transition-colors text-slate-300"
                                    title="保存/读取进度"
                                >
                                    <SaveIcon className="w-5 h-5" />
                                </button>
                                <div className="flex items-center bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-700 shadow-inner">
                                    <span className="text-lg sm:text-xl font-black text-indigo-400 flex items-center gap-1 transition-all">
                                        {yarn} <span className="text-lg sm:text-xl drop-shadow-md">🧶</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 主体内容区 */}
                    <div className="flex-1 p-4 md:p-6 w-full max-w-4xl mx-auto flex flex-col justify-center">
                        
                        {/* ================= 解谜大厅 View ================= */}
                        {currentView === 'game' && (
                            <div className="bg-slate-800 rounded-[2rem] p-5 sm:p-8 shadow-2xl border border-slate-700 flex flex-col items-center relative overflow-hidden animate-fade-in w-full max-w-lg mx-auto">
                                
                                {/* 羁绊陪伴UI */}
                                {companion && gameState.status === 'playing' && (
                                    <div className={`w-full bg-slate-900/80 p-3 rounded-2xl mb-4 flex items-center gap-3 border-2 transition-colors duration-300 shadow-inner ${triggerAnim ? 'border-emerald-500/50' : 'border-indigo-500/30'}`}>
                                        <div className="w-12 h-12 bg-slate-800 rounded-full flex-shrink-0 overflow-hidden shadow-md border border-slate-700 relative">
                                            <ComplexCatSvg cat={companion} className="scale-125 translate-y-2 absolute inset-0" />
                                        </div>
                                        <div className="flex flex-col flex-1">
                                            <div className="flex justify-between items-baseline mb-0.5">
                                                <span className="text-sm font-black text-indigo-300">{companion.name}</span>
                                                <span className="text-[10px] text-slate-500 font-bold bg-slate-800 px-2 py-0.5 rounded-full">当前羁绊</span>
                                            </div>
                                            <p key={triggerAnim} className={`text-[11px] sm:text-xs font-bold leading-tight ${triggerAnim ? 'text-emerald-400 animate-pulse' : 'text-slate-300'}`}>
                                                {companion.ability?.desc || '陪伴中...'}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                <div className="w-full flex justify-between items-end mb-6">
                                    <div>
                                        <h2 className="text-xl font-black text-white">收服魔法线团</h2>
                                        <p className="text-xs text-slate-400 mt-1">从 <span className="text-pink-500 font-bold">闪烁起点</span> 统领全色</p>
                                    </div>
                                    <div className="text-right">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">剩余步数 / 限制</span>
                                        <div className={`text-4xl font-black leading-none ${maxMoves - moves <= 3 ? 'text-red-500 animate-pulse drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'text-white'}`}>
                                            {maxMoves - moves} <span className="text-lg text-slate-600 font-bold">/ {maxMoves}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* 棋盘区域 */}
                                <div className="w-full aspect-square max-w-sm mb-8 relative flex justify-center items-center">
                                    <div className="grid gap-1 relative w-full h-full" style={{ gridTemplateColumns: `repeat(${BOARD_SIZE}, minmax(0, 1fr))` }}>
                                        {board.map((row, r) => row.map((colorIdx, c) => {
                                            const isStart = (r === startPos[0] && c === startPos[1]);
                                            const isEmpty = colorIdx === EMPTY_CELL;
                                            const isAffected = affectedCells.has(`${r},${c}`);
                                            
                                            return (
                                                <div 
                                                    key={`${r}-${c}`} 
                                                    className={`transition-all duration-300 relative rounded-md sm:rounded-lg ${isEmpty ? 'bg-transparent' : 'shadow-sm'} ${isAffected ? 'animate-ability-highlight z-10' : ''}`}
                                                    style={{ 
                                                        backgroundColor: isEmpty ? 'transparent' : GRID_COLORS[colorIdx],
                                                        boxShadow: isEmpty ? 'none' : 'inset 0 2px 4px rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.3)'
                                                    }}
                                                >
                                                    {isStart && gameState.status === 'playing' && (
                                                        <div className="absolute inset-0 border-2 border-white rounded-md bg-white/40 animate-pulse z-10 flex items-center justify-center">
                                                            <ZapIcon className="text-white w-4 h-4 sm:w-5 sm:h-5 drop-shadow-md" />
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        }))}
                                    </div>

                                    {/* 游戏结束覆盖层 */}
                                    {gameState.status !== 'playing' && (
                                        <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-md rounded-2xl flex flex-col items-center justify-center z-20 animate-fade-in shadow-2xl border border-slate-700">
                                            {gameState.status === 'won' ? (
                                                <React.Fragment>
                                                    <div className="text-6xl mb-4 animate-bounce drop-shadow-lg">✨</div>
                                                    <h3 className="text-3xl font-black text-indigo-400 mb-4">魔法收服！</h3>
                                                    <div className="flex flex-col items-end gap-2 mb-6 w-4/5 text-sm font-bold bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
                                                        <div className="flex justify-between w-full">
                                                            <span className="text-slate-400">通关基础</span>
                                                            <span className="text-white">+{gameState.baseReward}</span>
                                                        </div>
                                                        <div className="flex justify-between w-full">
                                                            <span className="text-slate-400">剩余步数加成</span>
                                                            <span className="text-emerald-400">+{gameState.bonus}</span>
                                                        </div>
                                                        {gameState.compBonus > 0 && (
                                                            <div className="flex justify-between w-full">
                                                                <span className="text-indigo-400">羁绊奖励</span>
                                                                <span className="text-indigo-400">+{gameState.compBonus}</span>
                                                            </div>
                                                        )}
                                                        {gameState.mult > 1 && (
                                                            <div className="flex justify-between w-full border-t border-slate-600 pt-2 mt-1">
                                                                <span className="text-yellow-400">倍率爆发</span>
                                                                <span className="text-yellow-400">x{gameState.mult}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <p className="text-xl font-black text-indigo-300">
                                                        总赚取 <span className="text-4xl text-white ml-1 drop-shadow-md">{gameState.reward}</span> 🧶
                                                    </p>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <AlertCircleIcon className="w-20 h-20 text-red-500 mb-4 animate-pulse drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]" />
                                                    <h3 className="text-3xl font-black text-slate-200 mb-3">步数耗尽</h3>
                                                    {gameState.penalty === 0 ? (
                                                        <p className="text-sm font-bold text-emerald-400 bg-emerald-900/20 px-5 py-2 rounded-full border border-emerald-800/50">羁绊庇护：免除惩罚！</p>
                                                    ) : (
                                                        <p className="text-sm font-bold text-red-400 bg-red-900/20 px-5 py-2 rounded-full border border-red-800/50">失败扣除 {gameState.penalty} 🧶</p>
                                                    )}
                                                </React.Fragment>
                                            )}
                                            <button 
                                                onClick={generateIrregularBoard}
                                                className="mt-8 flex items-center gap-2 bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-500 active:scale-95 transition-all shadow-[0_0_20px_rgba(79,70,229,0.4)]"
                                            >
                                                <RefreshCwIcon className="w-5 h-5" /> 继续挑战
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-3 sm:gap-5 mb-4 w-full justify-center max-w-sm">
                                    {GRID_COLORS.map((color, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleColorClick(idx)}
                                            disabled={gameState.status !== 'playing'}
                                            className="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl sm:rounded-3xl shadow-lg hover:scale-105 active:scale-95 transition-transform focus:outline-none relative overflow-hidden border-4 border-slate-700/50 flex-shrink-0"
                                            style={{ backgroundColor: color }}
                                        >
                                            <div className="absolute inset-0 bg-gradient-to-br from-white/30 to-transparent"></div>
                                        </button>
                                    ))}
                                </div>
                                
                                <button 
                                    onClick={handleGiveUp} 
                                    className="text-slate-500 hover:text-red-400 text-sm font-bold flex items-center gap-1 mt-4 bg-slate-900/50 hover:bg-red-900/20 px-5 py-2.5 rounded-xl transition-colors border border-transparent hover:border-red-900/50"
                                >
                                    <RefreshCwIcon className="w-4 h-4" /> 刷新关卡 / 放弃 (-5 🧶)
                                </button>
                            </div>
                        )}

                        {/* ================= 猫咪收藏室 View ================= */}
                        {currentView === 'collection' && (
                            <div className="bg-slate-800 rounded-[2rem] p-5 sm:p-8 shadow-2xl border border-slate-700 flex flex-col h-[75vh] w-full max-w-4xl mx-auto animate-fade-in relative">
                                
                                {/* 顶部状态与抽卡按钮 */}
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-700 pb-6 z-10">
                                    <div className="w-full sm:w-auto">
                                        <h2 className="text-2xl font-black text-white flex items-center gap-2">
                                            百猫典藏图鉴
                                        </h2>
                                        <div className="flex items-center gap-4 mt-2">
                                            <div className="text-lg font-black text-indigo-400">
                                                <span className="text-3xl text-white mr-1">{collection.length}</span>/ 100
                                            </div>
                                            <div className="flex-1 w-32 h-2.5 bg-slate-900 rounded-full overflow-hidden shadow-inner border border-slate-700">
                                                <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-700 relative" style={{ width: `${progress}%` }}>
                                                     <div className="absolute inset-0 bg-white/20 animate-shimmer w-full"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={handleSummon}
                                        disabled={yarn < SUMMON_COST || summonState !== 'idle'}
                                        className={`w-full sm:w-auto flex-shrink-0 relative overflow-hidden px-6 py-4 rounded-2xl font-black text-lg text-white shadow-xl transition-all ${yarn >= SUMMON_COST && summonState === 'idle' ? 'bg-indigo-600 hover:bg-indigo-500 hover:-translate-y-1 active:translate-y-1 shadow-[0_0_20px_rgba(79,70,229,0.4)] border border-indigo-400' : 'bg-slate-700 text-slate-400 cursor-not-allowed border border-slate-600 shadow-none'}`}
                                    >
                                        <span className="relative z-10 flex items-center justify-center gap-2">
                                            <PackageIcon className="w-5 h-5" />
                                            盲盒 (-50 🧶)
                                        </span>
                                        {yarn >= SUMMON_COST && summonState === 'idle' && (
                                            <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[100%] animate-shimmer"></div>
                                        )}
                                    </button>
                                </div>

                                {/* 图鉴网格 */}
                                <div className="flex-1 overflow-y-auto bg-slate-900 rounded-2xl p-4 sm:p-6 border border-slate-700 custom-scrollbar shadow-inner relative z-0">
                                    <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-2 sm:gap-3">
                                        {CAT_DICTIONARY.map(cat => {
                                            const isUnlocked = collection.includes(cat.id);
                                            return (
                                                <div 
                                                    key={cat.id} 
                                                    className={`relative aspect-square rounded-xl flex flex-col items-center justify-center transition-all duration-300 ${isUnlocked ? 'bg-slate-800 hover:bg-indigo-900/50 hover:-translate-y-1 hover:shadow-lg hover:shadow-indigo-500/30 cursor-pointer border border-slate-600 group overflow-hidden' : 'bg-slate-900/50 opacity-20 border border-slate-800 overflow-hidden'}`}
                                                    onClick={() => isUnlocked && setSummonResult({ cat, isNew: false, previewOnly: true, forceShow: true })}
                                                    title={isUnlocked ? cat.name : `No.${cat.id} 未知生物`}
                                                >
                                                    <div className="w-[80%] h-[80%] group-hover:scale-110 transition-transform duration-300 relative">
                                                        {isUnlocked ? (
                                                            <ComplexCatSvg cat={cat} className="absolute inset-0" />
                                                        ) : (
                                                            <ComplexCatSvg cat={cat} className="absolute inset-0 brightness-0 contrast-200 grayscale drop-shadow-none pointer-events-none" />
                                                        )}
                                                    </div>
                                                    {isUnlocked && (
                                                        <div className={`absolute -bottom-1 -right-1 text-[8px] font-black px-1 rounded shadow-sm ${RARITY_COLORS[cat.rarity]}`}>
                                                            {cat.rarity}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ================= 存档/读档 弹窗 ================= */}
                    {showSaveModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={() => setShowSaveModal(false)}>
                            <div className="bg-slate-800 rounded-3xl p-6 max-w-sm w-full border border-slate-600 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-black text-white mb-4 flex items-center gap-2">
                                    <SaveIcon className="w-5 h-5 text-indigo-400" /> 进度存取 (代码)
                                </h3>
                                
                                <div className="mb-6">
                                    <p className="text-sm text-slate-400 mb-2">生成你的专属存档代码，可以复制保存到备忘录，下次在此粘贴即可恢复进度。</p>
                                    <div className="flex gap-2">
                                        <input type="text" readOnly value={generateSaveCode()} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-300 text-sm font-mono outline-none" />
                                        <button onClick={handleCopyCode} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-1">
                                            {copySuccess ? <CheckIcon className="w-4 h-4"/> : '复制'}
                                        </button>
                                    </div>
                                </div>

                                <div className="border-t border-slate-700 pt-6">
                                    <p className="text-sm font-bold text-indigo-400 mb-2">导入存档代码：</p>
                                    <textarea 
                                        value={importCode}
                                        onChange={(e) => setImportCode(e.target.value)}
                                        placeholder="在此粘贴你的代码..."
                                        className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-300 text-sm font-mono outline-none mb-3 h-20 resize-none"
                                    ></textarea>
                                    <div className="flex gap-3">
                                        <button onClick={handleImportCode} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl font-bold transition-colors">
                                            确认导入
                                        </button>
                                        <button onClick={() => setShowSaveModal(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl font-bold transition-colors">
                                            关闭
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================= 全局弹窗：抽卡/详情 ================= */}
                    {(summonState !== 'idle' || (summonResult && summonResult.forceShow)) && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl" onClick={() => (summonState === 'revealed' || (summonResult && summonResult.forceShow)) ? closeResult() : null}>
                            
                            {(summonState === 'dropping' || summonState === 'shaking') && (
                                <div className={`w-48 h-48 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl border-8 border-indigo-400 flex items-center justify-center shadow-[0_0_50px_rgba(99,102,241,0.5)] relative ${summonState === 'dropping' ? 'animate-box-drop' : 'animate-box-shake'}`}>
                                    <div className="absolute w-full h-8 bg-white/20 top-1/2 -translate-y-1/2"></div>
                                    <div className="absolute h-full w-8 bg-white/20 left-1/2 -translate-x-1/2"></div>
                                    <span className="text-7xl font-black text-white relative z-10 drop-shadow-md">?</span>
                                </div>
                            )}

                            {summonState === 'bursting' && (
                                <div className="w-full h-full flex items-center justify-center animate-flash-bang">
                                    <div className="w-20 h-20 bg-white rounded-full blur-3xl scale-[20]"></div>
                                </div>
                            )}

                            {(summonState === 'revealed' || (summonResult && summonResult.forceShow)) && summonResult && (
                                <div className="bg-slate-800 rounded-[2rem] p-6 sm:p-10 max-w-md w-full text-center shadow-2xl transform animate-item-pop relative overflow-hidden border border-slate-600" onClick={e => e.stopPropagation()}>
                                    <div className="absolute inset-0 z-0 pointer-events-none opacity-20" style={{ background: 'repeating-conic-gradient(from 0deg, transparent 0deg 15deg, #000 15deg 30deg)' }}></div>
                                    
                                    <div className="relative z-10">
                                        <h3 className="text-xl font-black text-slate-300 mb-1 drop-shadow-md">
                                            {summonResult.previewOnly ? `NO.${summonResult.cat.id} 绝密档案` : (summonResult.isNew ? '✨ 奇迹降临！新图鉴解锁 ✨' : '获得了熟悉的旧面孔')}
                                        </h3>
                                        
                                        <div className="my-10 flex justify-center">
                                            <div className="w-64 h-64 relative group">
                                                {(summonResult.cat.rarity === 'SSR' || summonResult.cat.rarity === 'UR') && (
                                                    <div className="absolute inset-0 bg-yellow-400/10 rounded-full blur-3xl animate-pulse"></div>
                                                )}
                                                <ComplexCatSvg cat={summonResult.cat} className="animate-float-large absolute inset-0" />
                                            </div>
                                        </div>

                                        <div className={`inline-block px-5 py-2 rounded-xl font-black text-sm shadow-lg mb-4 border border-white/20 ${RARITY_COLORS[summonResult.cat.rarity]}`}>
                                            档案等级：{summonResult.cat.rarity}
                                        </div>
                                        
                                        <h4 className="text-3xl font-black text-white mb-3 drop-shadow-md">{summonResult.cat.name}</h4>
                                        
                                        <div className="bg-indigo-900/40 border border-indigo-500/30 rounded-xl p-3 mb-4 inline-block max-w-full">
                                            <p className="text-sm font-bold text-indigo-300 mb-1 flex items-center justify-center gap-1"><ZapIcon className="w-4 h-4"/> 专属能力</p>
                                            <p className="text-xs sm:text-sm font-medium text-indigo-100">{summonResult.cat.ability?.desc || '未觉醒能力'}</p>
                                        </div>

                                        <p className="text-sm text-slate-400 bg-slate-900/60 p-4 rounded-xl mb-8 border border-slate-700 leading-relaxed italic">
                                            "{summonResult.cat.desc}"
                                        </p>

                                        {!summonResult.isNew && !summonResult.previewOnly && (
                                            <p className="text-sm text-indigo-400 font-bold mb-6 bg-indigo-900/20 py-3 rounded-xl border border-indigo-800/50 flex items-center justify-center gap-2 shadow-inner">
                                                重复转化：回收补偿 <span className="text-lg text-white">+{REFUND_RATES[summonResult.cat.rarity]} 🧶</span>
                                            </p>
                                        )}

                                        <button 
                                            onClick={closeResult}
                                            className="w-full bg-white text-slate-900 font-black py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] text-lg"
                                        >
                                            {summonResult.previewOnly ? '关闭档案' : (summonResult.isNew ? '收入百猫墙' : '收下补偿并返回')}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
